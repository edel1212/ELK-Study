services:
  # 1. Elasticsearch: 로그 데이터를 저장하고 검색하는 핵심 엔진
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node # 클러스터 구성 없이 단일 노드로 실행
      - xpack.security.enabled=false # 로컬 테스트를 위해 비밀번호 인증 비활성화
      - ES_JAVA_OPTS=-Xms512m -Xmx512m # 메모리 제한
    ports:
      - "9200:9200"
    networks:
      - elk-network

  # 2. Logstash: 데이터를 받아서 가공한 뒤 Elasticsearch로 쏴주는 파이프라인
  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    container_name: logstash
    # Logstash 설정
    volumes:
      - ./logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    ports:
      - "9600:9600" # 상태 모니터링 API 포트 (선택)
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
    depends_on:
      - elasticsearch
    networks:
      - elk-network

  # 3. Kibana: Elasticsearch에 저장된 로그를 시각화하고 검색하는 웹 대시보드
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: kibana
    environment:
      # Kibana가 바라볼 Elasticsearch 주소 (같은 도커 네트워크 안이므로 컨테이너명 사용)
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601" # 웹 브라우저 접속 포트
    depends_on:
      - elasticsearch
    networks:
      - elk-network

  # 4. Filebeat: Logstash 대신 로그 파일을 읽어 Logstash에 전달 하는 역할을 함
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.12.0
    container_name: filebeat
    user: root # 도커 환경에서 설정 파일 권한 에러 방지용
    volumes:
      # Filebeat 자체 설정 파일 마운트
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      # ✅ 기존 Logstash가 하던 로그 폴더 마운트를 Filebeat가 가져옵니다!
      - /Users/yoo/Desktop/Project/ELK-Study/logging-server/logs:/usr/share/filebeat/logs
    depends_on:
      - logstash
    networks:
      - elk-network

# 네트워크 설정
networks:
  elk-network:
    driver: bridge
